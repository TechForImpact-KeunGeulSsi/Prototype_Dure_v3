<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>우리 아이 도감 — 두레 부모님</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .layout { display:grid; grid-template-columns:260px 1fr; gap:24px; max-width:1060px; margin:0 auto; padding:32px 24px; min-height:calc(100vh - 60px); }
    .sidebar { position:sticky; top:80px; height:fit-content; }
    .child-sel-btn { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:var(--r-sm); border:2px solid var(--border); cursor:pointer; transition:all .2s; background:white; width:100%; margin-bottom:8px; font-family:inherit; text-align:left; }
    .child-sel-btn:hover { border-color:var(--green); background:var(--green-light); }
    .child-sel-btn.active { border-color:var(--green); background:var(--green-light); }
    .comp-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .comp-label { font-size:12px; font-weight:600; width:72px; flex-shrink:0; }
    .comp-bar { flex:1; height:10px; background:var(--green-light); border-radius:5px; overflow:hidden; }
    .comp-fill { height:100%; background:var(--green); border-radius:5px; transition:width .8s ease; }
    .comp-n { font-size:11px; color:var(--muted); width:24px; text-align:right; }
    .quote-item { background:var(--green-light); border-left:3px solid var(--green); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:10px 14px; font-size:13px; color:var(--green-dark); margin-bottom:8px; font-style:italic; line-height:1.5; }
    .act-chip { display:inline-flex; align-items:center; gap:4px; padding:4px 12px; border-radius:50px; background:white; border:1px solid var(--border); font-size:12px; font-weight:500; margin:3px; }
    .report-gen { display:flex; flex-direction:column; align-items:center; padding:32px; text-align:center; }
    @media(max-width:768px){ .layout{grid-template-columns:1fr;} .sidebar{position:static;} }
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand"><div class="nav-logo">🌱</div>두레</a>
  <div class="nav-links">
    <a href="index.html">홈</a><a href="child.html">아이</a>
    <a href="teacher.html">선생님</a><a href="parent.html" class="active">부모님</a><a href="dashboard.html">대시보드</a>
  </div>
</nav>

<div class="layout">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div style="margin-bottom:16px;">
      <h2 style="font-size:20px;font-weight:900;margin-bottom:4px;">💌 우리 아이<br>성장 기록</h2>
      <p style="font-size:12px;color:var(--muted);">아이를 선택하면 도감과 리포트를 확인할 수 있어요</p>
    </div>
    <div id="childSideList"></div>
    <div style="margin-top:16px;padding:14px;background:var(--amber-light);border-radius:var(--r-sm);font-size:12px;color:#92550A;line-height:1.7;">
      📱 실제 서비스에서는 매달 카카오 알림으로 자동 발송됩니다
    </div>
  </div>

  <!-- 메인 콘텐츠 -->
  <div id="contentArea">
    <div class="empty fade-in">
      <div class="ico">💌</div>
      <h3>아이를 선택해주세요</h3>
      <p>왼쪽에서 아이 이름을 클릭하면<br>도감과 성장 기록을 확인할 수 있어요</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selChild = null;
const ACT_ICONS = {'목공수업':'🪵','생태교실':'🌿','마을탐험':'🗺️','음반제작':'🎵','두부만들기':'🫘','달리기훈련':'🏃','엄빠학교':'📚','플로깅':'🌍','어르신 말벗':'👴'};

async function init() {
  const children = await fetch('/api/children').then(r=>r.json());
  const el = document.getElementById('childSideList');
  children.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'child-sel-btn';
    btn.innerHTML = `<span style="font-size:24px">${c.emoji}</span><div><div style="font-weight:700;font-size:14px">${c.name}</div><div style="font-size:11px;color:var(--muted)">${c.grade} · ${c.village}</div></div>`;
    btn.onclick = () => { document.querySelectorAll('.child-sel-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectChild(c); };
    el.appendChild(btn);
  });
}

async function selectChild(child) {
  selChild = child;
  document.getElementById('contentArea').innerHTML = `<div class="report-gen"><div class="spinner"></div><p style="margin-top:12px;color:var(--muted);font-size:13px">${child.name} 기록 불러오는 중...</p></div>`;

  const [cards, missions, convs] = await Promise.all([
    fetch(`/api/cards?childId=${child.id}`).then(r=>r.json()),
    fetch(`/api/missions/${child.id}`).then(r=>r.json()),
    fetch(`/api/conversations/${child.id}`).then(r=>r.json()),
  ]);

  const doneCards = cards.filter(c=>!c.pending);
  const doneMissions = missions.filter(m=>m.completed);
  const allTags = doneCards.flatMap(c=>c.tags);
  const tagStats = {};
  allTags.forEach(t=>{ tagStats[t]=(tagStats[t]||0)+1; });
  const maxTag = Math.max(...Object.values(tagStats), 1);
  const activitySet = [...new Set(doneCards.map(c=>c.activity))];
  const quotes = doneCards.map(c=>c.childQuote).filter(Boolean);

  const html = `
    <div class="fade-in">
      <!-- 헤더 -->
      <div class="card card-lg" style="margin-bottom:20px;background:linear-gradient(135deg,#0F6E56,#1D9E75);color:white;border:none;">
        <div style="display:flex;align-items:center;gap:18px;">
          <div style="font-size:52px">${child.emoji}</div>
          <div>
            <h2 style="font-size:22px;font-weight:900;margin-bottom:4px">${child.name}</h2>
            <p style="font-size:13px;opacity:.85">${child.grade} · ${child.village}</p>
            <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
              <span style="background:rgba(255,255,255,.2);border-radius:50px;padding:4px 12px;font-size:12px">📖 카드 ${doneCards.length}장</span>
              <span style="background:rgba(255,255,255,.2);border-radius:50px;padding:4px 12px;font-size:12px">🎯 미션 ${doneMissions.length}개</span>
              <span style="background:rgba(255,255,255,.2);border-radius:50px;padding:4px 12px;font-size:12px">💬 대화 ${convs.length}회</span>
              <span style="background:rgba(255,255,255,.2);border-radius:50px;padding:4px 12px;font-size:12px">🎒 아이템 ${child.items?.length||0}개</span>
            </div>
          </div>
        </div>
      </div>

      <div class="grid-2" style="gap:20px;margin-bottom:20px;">
        <!-- 역량 분석 -->
        <div class="card">
          <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">⭐ 역량 분석</h3>
          ${Object.keys(tagStats).length === 0
            ? '<p style="font-size:13px;color:var(--muted)">아직 역량 태그 기록이 없어요</p>'
            : Object.entries(tagStats).sort((a,b)=>b[1]-a[1]).map(([tag,cnt]) => `
              <div class="comp-row">
                <span class="comp-label">${tag}</span>
                <div class="comp-bar"><div class="comp-fill" style="width:${Math.round(cnt/maxTag*100)}%"></div></div>
                <span class="comp-n">${cnt}</span>
              </div>`).join('')}
        </div>

        <!-- 캐릭터 + 아이템 -->
        <div class="card">
          <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">🎮 캐릭터 현황</h3>
          <div style="text-align:center;font-size:48px;margin-bottom:8px">${child.emoji}</div>
          <div style="text-align:center;font-size:13px;font-weight:700;margin-bottom:12px">${child.name}의 캐릭터</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">
            ${(child.items||[]).length === 0
              ? '<p style="font-size:12px;color:var(--muted)">아직 아이템이 없어요. 미션을 완료하면 생겨요!</p>'
              : (child.items||[]).map(it=>`<div style="background:var(--green-light);border-radius:8px;padding:6px 10px;font-size:13px;border:1px solid var(--border)">${it}</div>`).join('')}
          </div>
        </div>
      </div>

      <!-- 참여 활동 -->
      <div class="card" style="margin-bottom:20px;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">🏡 참여한 활동들</h3>
        ${activitySet.length === 0
          ? '<p style="font-size:13px;color:var(--muted)">아직 참여한 활동이 없어요</p>'
          : `<div>${activitySet.map(a=>`<span class="act-chip">${ACT_ICONS[a]||'⭐'} ${a}</span>`).join('')}</div>`}
      </div>

      <!-- 도감 카드들 -->
      <div class="card" style="margin-bottom:20px;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">📖 ${child.name}의 마을 도감 (${doneCards.length}장)</h3>
        ${doneCards.length === 0
          ? '<div class="empty" style="padding:24px 0"><div class="ico">📖</div><h3>아직 카드가 없어요</h3><p>마루와 대화하면 카드가 생겨요!</p></div>'
          : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px">
              ${doneCards.map(c=>`
                <div class="almanac-card">
                  <span class="card-emoji">${c.emoji||'⭐'}</span>
                  <div class="card-name">${c.cardName}</div>
                  <div class="card-desc">${c.cardDesc}</div>
                  ${c.childQuote?`<div class="card-quote">"${c.childQuote}"</div>`:''}
                  <div class="card-meta">${c.date}</div>
                </div>`).join('')}
            </div>`}
      </div>

      <!-- 아이 목소리 -->
      <div class="card" style="margin-bottom:20px;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">🗣️ ${child.name}의 목소리</h3>
        ${quotes.length === 0
          ? '<p style="font-size:13px;color:var(--muted)">마루와 대화하면 아이의 말이 여기에 담겨요</p>'
          : quotes.map(q=>`<div class="quote-item">"${q}"</div>`).join('')}
      </div>

      <!-- AI 리포트 -->
      <div class="card" id="reportSection">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <h3 style="font-size:15px;font-weight:700;margin:0">🤖 이달의 성장 리포트</h3>
          <button class="btn btn-primary btn-sm" onclick="generateReport()">리포트 생성</button>
        </div>
        <div id="reportContent">
          <p style="font-size:13px;color:var(--muted)">버튼을 누르면 Claude AI가 ${child.name}의 이달 활동을 분석해 역량 리포트를 작성해드려요.</p>
        </div>
      </div>
    </div>`;

  document.getElementById('contentArea').innerHTML = html;

  // 기존 리포트 로드
  fetch(`/api/report/${child.id}`).then(r=>r.json()).then(rep => {
    if (rep) renderReport(rep);
  });
}

async function generateReport() {
  const btn = document.querySelector('#reportSection .btn');
  btn.disabled = true; btn.textContent = '생성 중...';
  document.getElementById('reportContent').innerHTML = `<div class="report-gen"><div class="spinner"></div><p style="margin-top:10px;font-size:13px;color:var(--muted)">Claude AI가 성장 리포트를 작성 중입니다...</p></div>`;
  try {
    const r = await fetch('/api/report/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ childId: selChild.id }) });
    const d = await r.json();
    if (d.report) renderReport(d.report);
    else throw new Error('실패');
  } catch {
    document.getElementById('reportContent').innerHTML = '<p style="color:#e53e3e;font-size:13px">오류가 발생했어요. 잠시 후 다시 시도해주세요.</p>';
    btn.disabled = false; btn.textContent = '다시 시도';
  }
}

function renderReport(report) {
  const btn = document.querySelector('#reportSection .btn');
  if (btn) { btn.disabled = false; btn.textContent = '다시 생성'; }
  let html = report.content
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  document.getElementById('reportContent').innerHTML = `
    <div class="report-md">${html}</div>
    <div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
      생성일: ${new Date(report.generatedAt).toLocaleDateString('ko-KR')} · AI 생성
    </div>`;
}

function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3000);}
init();
</script>
</body></html>
